{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header bg-secondary text-white">
        <h4 class="mb-0">Available Forms</h4>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
        <table class="table table-striped table-hover mb-0">
            <thead class="table-light">
                <tr>
                    <th>Form Version ID</th>
                    <th>Version</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for form in forms %}
                <tr>
                    <td>{{ form.id }}</td>
                    <td>v{{ form.version_number }}</td>
                    <td>
                        <a href="{% url 'fill_form' form.id %}" class="btn btn-primary btn-sm">
                            <i class="fa fa-pencil-alt"></i> Fill
                        </a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-center">No forms available</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        </div>
    </div>
</div>
{% endblock %}
