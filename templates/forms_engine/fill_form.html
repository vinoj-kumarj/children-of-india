{% extends "base.html" %}

{% load custom_filters %}

{% block content %}
<div class="card">
    <div class="card-header bg-secondary text-white">
        <h4 class="mb-0">{{ title }}</h4>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in fields %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label.en }}</label>
                    {% if field.type == "text" %}
                        <input type="text" name="{{ field.name }}" class="form-control"
                               value="{% if draft %}{{ draft.data_json|get_item:field.name }}{% endif %}">
                    {% elif field.type == "number" %}
                        <input type="number" name="{{ field.name }}" class="form-control"
                               value="{% if draft %}{{ draft.data_json|get_item:field.name }}{% endif %}">
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-success">
                <i class="fa fa-save"></i> Save Draft
            </button>
        </form>
    </div>
</div>
{% endblock %}
