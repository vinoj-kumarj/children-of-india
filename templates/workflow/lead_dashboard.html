{% extends "base.html" %}

{% block content %}
<div class="mb-3">
    <h2>Lead Dashboard</h2>
</div>
{% if submissions %}
<div class="table-responsive">
    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>User</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for s in submissions %}
            <tr>
                <td>{{ s.id }}</td>
                <td>{{ s.user.email }}</td>
                <td>{{ s.workflow_state }}</td>
                <td>
                    <a href="{% url 'lead_review' s.id %}" class="btn btn-sm btn-outline-primary">
                        <i class="fa fa-eye"></i> Review
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="alert alert-info">No submissions pending lead review.</div>
{% endif %}
{% endblock %}
